name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Unzip project files
      run: |
        unzip -o SpamBlocker_v2_github.zip
        rm SpamBlocker_v2_github.zip

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find and Run Gradle Build
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: No se encontró el archivo gradlew en ningún lado."
          exit 1
        fi
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        cd "$GRADLEW_DIR"
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
